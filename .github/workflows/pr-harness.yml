name: PR Harness

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-harness-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      runtime_harness_changed: ${{ steps.detect.outputs.runtime_harness_changed }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 识别是否需要 runtime harness
        id: detect
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            echo "runtime_harness_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git diff --name-only "$BASE_SHA" "$HEAD_SHA" > changed-files.txt
          cat changed-files.txt

          if grep -Eq '^(web/|scripts/|tests/|resources/|package\.json|package-lock\.json|\.github/workflows/(pr-harness|browser-smoke|harness-nightly)\.yml)' changed-files.txt; then
            echo "runtime_harness_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "runtime_harness_changed=false" >> "$GITHUB_OUTPUT"
          fi

  pr-smoke:
    name: pr-smoke
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 初始化环境
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip

      - name: 执行脚本回归与源码级 guardrail
        shell: bash
        run: |
          set -euo pipefail
          python3 -m unittest tests.test_version_manager tests.test_scripts_comprehensive
          python3 scripts/agent_static_guardrails.py

  agent-smoke:
    name: agent-smoke
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 缓存 pip
        if: needs.changes.outputs.runtime_harness_changed == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-python-3.11-agent-smoke-v1
          restore-keys: |
            pip-${{ runner.os }}-python-3.11-

      - name: 缓存 uv
        if: needs.changes.outputs.runtime_harness_changed == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-python-3.11-runtime-v1-${{ hashFiles('scripts/agent_test_runner.py') }}
          restore-keys: |
            uv-${{ runner.os }}-python-3.11-runtime-v1-
            uv-${{ runner.os }}-python-3.11-

      - name: 安装 uv
        if: needs.changes.outputs.runtime_harness_changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install uv

      - name: 执行 agent smoke
        if: needs.changes.outputs.runtime_harness_changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/agent_harness.py --skip-doctor --skip-static-guardrails --skip-guardrails --smoke-suite minimal --artifact-dir artifacts/ci/agent-smoke

      - name: 写入跳过说明
        if: always() && needs.changes.outputs.runtime_harness_changed != 'true'
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Agent Smoke Summary"
            echo
            echo "- Overall: \`SKIPPED\`"
            echo "- 本次 PR 未涉及 runtime harness 相关路径，跳过 agent smoke 以降低 CI 成本。"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 写入 agent smoke 摘要
        if: always() && needs.changes.outputs.runtime_harness_changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f artifacts/ci/agent-smoke/latest.json ]]; then
            python3 scripts/agent_ci_summary.py \
              --latest-json artifacts/ci/agent-smoke/latest.json \
              --title "Agent Smoke Summary" >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Agent Smoke Summary"
              echo
              echo "- Overall: \`UNKNOWN\`"
              echo "- 运行未生成 latest.json，请优先检查执行步骤日志。"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: 上传 agent smoke 工件
        if: always() && needs.changes.outputs.runtime_harness_changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: agent-smoke-artifacts
          path: artifacts/ci/agent-smoke
          if-no-files-found: ignore

  guardrails:
    name: guardrails
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 缓存 pip
        if: needs.changes.outputs.runtime_harness_changed == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-python-3.11-guardrails-v1
          restore-keys: |
            pip-${{ runner.os }}-python-3.11-

      - name: 缓存 uv
        if: needs.changes.outputs.runtime_harness_changed == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-python-3.11-runtime-v1-${{ hashFiles('scripts/agent_test_runner.py') }}
          restore-keys: |
            uv-${{ runner.os }}-python-3.11-runtime-v1-
            uv-${{ runner.os }}-python-3.11-

      - name: 安装 uv
        if: needs.changes.outputs.runtime_harness_changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install uv

      - name: 执行关键不变量检查
        if: needs.changes.outputs.runtime_harness_changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/agent_harness.py --skip-doctor --skip-static-guardrails --skip-smoke --guardrails-suite minimal --artifact-dir artifacts/ci/guardrails

      - name: 写入跳过说明
        if: always() && needs.changes.outputs.runtime_harness_changed != 'true'
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Guardrails Summary"
            echo
            echo "- Overall: \`SKIPPED\`"
            echo "- 本次 PR 未涉及 runtime harness 相关路径，跳过 runtime guardrails 以降低 CI 成本。"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 写入 guardrails 摘要
        if: always() && needs.changes.outputs.runtime_harness_changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f artifacts/ci/guardrails/latest.json ]]; then
            python3 scripts/agent_ci_summary.py \
              --latest-json artifacts/ci/guardrails/latest.json \
              --title "Guardrails Summary" >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Guardrails Summary"
              echo
              echo "- Overall: \`UNKNOWN\`"
              echo "- 运行未生成 latest.json，请优先检查执行步骤日志。"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: 上传 guardrails 工件
        if: always() && needs.changes.outputs.runtime_harness_changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: guardrails-artifacts
          path: artifacts/ci/guardrails
          if-no-files-found: ignore
