<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=intus-20260507">
    <link rel="shortcut icon" href="favicon.svg?v=intus-20260507">
    <title>Intus 查看方案</title>
    <meta name="robots" content="noindex,nofollow,noarchive">
    <script>
        (function () {
            const storageKey = 'dv-theme-mode';
            const validModes = ['light', 'dark', 'system'];
            let mode = 'system';
            try {
                const saved = localStorage.getItem(storageKey);
                if (validModes.includes(saved)) mode = saved;
            } catch (error) {
                mode = 'system';
            }
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            const effective = mode === 'system' ? (prefersDark ? 'dark' : 'light') : mode;
            const root = document.documentElement;
            root.setAttribute('data-theme-mode', mode);
            root.setAttribute('data-theme', effective);
            root.style.colorScheme = effective;
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vendor/css/fonts.css">
    <link rel="stylesheet" href="solution.css?v=20260318-solution-v64">
</head>

<body>
    <div class="solution-page">
        <main class="solution-main">
            <section class="solution-state-card" id="solution-state-card">
                <div class="solution-state-badge">正在准备</div>
                <h1 class="solution-state-title">正在生成方案视图</h1>
                <p class="solution-state-text">系统会根据当前访谈报告内容生成决策型方案视图，请稍候。</p>
            </section>

            <div class="solution-shell layout-has-sidebar" id="solution-shell" hidden>
                <aside class="solution-toc-sidebar" id="solution-toc-sidebar">
                    <div class="solution-toc-sticky">
                        <div class="solution-toc-header">方案大纲</div>
                        <nav class="solution-toc-nav" id="solution-toc-nav"></nav>
                    </div>
                </aside>
                
                <div class="solution-shell-main">
                    <header class="solution-topbar" id="solution-topbar"></header>
                    <section class="solution-quality-strip" id="solution-quality-strip" hidden></section>
                    <div class="solution-content" id="solution-content"></div>
                </div>

                <div class="solution-action-bar" id="solution-action-bar" hidden>
                    <button type="button" class="solution-action-btn is-primary" id="btn-share">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                        分享方案
                    </button>
                </div>

                <aside class="solution-share-panel" id="solution-share-panel" hidden>
                    <div class="solution-share-panel-head">
                        <div>
                            <div class="solution-share-panel-kicker">方案分享</div>
                            <div class="solution-share-panel-title">复制链接后即可对外查看</div>
                        </div>
                        <button type="button" class="solution-share-panel-close" id="btn-share-close" aria-label="关闭分享面板">关闭</button>
                    </div>
                    <p class="solution-share-panel-desc" id="solution-share-desc">该链接为匿名只读链接，打开后只展示方案页内容。</p>
                    <label class="solution-share-field">
                        <span class="solution-share-field-label">分享链接</span>
                        <input type="text" class="solution-share-input" id="solution-share-input" readonly value="">
                    </label>
                    <div class="solution-share-actions">
                        <button type="button" class="solution-action-btn is-primary" id="btn-share-copy">复制链接</button>
                    </div>
                </aside>
            </div>
        </main>
    </div>

    <nav class="solution-mobile-nav" id="solution-mobile-nav" hidden></nav>

    <aside class="solution-evidence-drawer" id="solution-evidence-drawer" hidden>
        <div class="solution-evidence-backdrop" data-evidence-close></div>
        <div class="solution-evidence-panel">
            <div class="solution-evidence-head">
                <div>
                    <div class="solution-evidence-kicker">证据锚点</div>
                    <div class="solution-evidence-title" id="solution-evidence-title">当前章节证据</div>
                </div>
                <button type="button" class="solution-evidence-close" data-evidence-close>关闭</button>
            </div>
            <div class="solution-evidence-body" id="solution-evidence-body"></div>
        </div>
    </aside>

    <script src="solution.js?v=20260318-solution-v64"></script>
</body>

</html>
